##############################################################################
# SF_connect.properties
# Snowflake Kafka Connector — Kalshi Trading Data Pipeline
#
# Connector: Snowpipe Streaming ingestion into Snowflake Managed Iceberg Tables
# Docs: https://docs.snowflake.com/en/user-guide/kafka-connector/index
#
# IMPORTANT: Before deploying, update these values:
#   1. snowflake.private.key — paste your KAFKAGUY RSA private key (PKCS8, no headers)
#   2. Bootstrap servers if not using localhost
#
# Deploy via Kafka Connect REST API:
#   curl -X POST http://localhost:8083/connectors \
#     -H "Content-Type: application/json" \
#     -d @kafka/connector_payload.json
##############################################################################

name=kalshi-snowflake-sink
connector.class=com.snowflake.kafka.connector.SnowflakeSinkConnector
tasks.max=1

# --- Kafka ---
topics=kalshi-series,kalshi-markets,kalshi-trades,kalshi-tags,kalshi-sports

# --- Snowflake Connection ---
snowflake.url.name=${SNOWFLAKE_URL}
snowflake.user.name=KAFKAGUY
snowflake.role.name=ACCOUNTADMIN
snowflake.private.key=${SNOWFLAKE_PRIVATE_KEY}

# --- Ingestion Method: Snowpipe Streaming ---
snowflake.ingestion.method=SNOWPIPE_STREAMING

# --- Target Database ---
snowflake.database.name=KALSHI_DB
snowflake.schema.name=STREAMING

# --- Topic-to-Table Mapping ---
# Each topic maps to its Iceberg table
snowflake.topic2table.map=kalshi-series:KALSHI_SERIES,kalshi-markets:KALSHI_MARKETS,kalshi-trades:KALSHI_TRADES,kalshi-tags:KALSHI_CATEGORIES_TAGS,kalshi-sports:KALSHI_SPORTS_FILTERS

# --- Schema Evolution ---
snowflake.enable.schematization=FALSE

# --- Data Format ---
key.converter=org.apache.kafka.connect.storage.StringConverter
value.converter=com.snowflake.kafka.connector.records.SnowflakeJsonConverter

# --- Error Handling ---
errors.tolerance=all
errors.log.enable=true
errors.log.include.messages=true

# --- Buffer / Flush Settings ---
# Flush when buffer reaches 10000 records or 120 seconds, whichever comes first
buffer.count.records=10000
buffer.flush.time=120
buffer.size.bytes=104857600
